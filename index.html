<!DOCTYPE html>
<html>
<head>
    <title>HF Assistant</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #667eea, #764ba2); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, button { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        input[type="password"] { width: 100%; }
        select { width: 100%; }
        button { background: #667eea; color: white; border: none; cursor: pointer; }
        button:hover { background: #5a6fd8; }
        #chat { height: 400px; border: 1px solid #ddd; padding: 15px; overflow-y: auto; margin: 15px 0; background: #f9f9f9; border-radius: 5px; }
        .msg { margin: 10px 0; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #e3f2fd; margin-left: auto; text-align: right; }
        .bot { background: #f3e5f5; margin-right: auto; }
        .loading { color: #666; font-style: italic; }
        h2 { color: #667eea; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🤖 Hugging Face AI Assistant</h2>
        
        <input type="password" id="key" placeholder="🔑 Enter your Hugging Face API Key">
        
        <select id="model">
            <option value="gpt2">🤖 GPT-2</option>
            <option value="deepseek-ai/DeepSeek-R1">🧠 DeepSeek-R1</option>
            <option value="microsoft/DialoGPT-medium">💬 DialoGPT Medium</option>
        </select>
        
        <div id="chat">
            <div style="text-align: center; color: #666; padding: 40px;">
                👋 Welcome! Enter your API key and start chatting with AI
            </div>
        </div>
        
        <div>
            <input type="text" id="msg" placeholder="💭 Type your message here..." style="width: 75%;">
            <button onclick="send()">🚀 Send</button>
        </div>
        
        <div style="text-align: center; margin-top: 15px;">
            <button onclick="clearChat()" style="background: #666;">🗑️ Clear Chat</button>
        </div>
        
        <div style="text-align: center; margin-top: 20px; font-size: 12px; color: #666;">
            Need an API key? Get one at <a href="https://huggingface.co/settings/tokens" target="_blank" style="color: #667eea;">Hugging Face</a>
        </div>
    </div>

    <script>
        let isLoading = false;
        
        document.getElementById('msg').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !isLoading) {
                send();
            }
        });
        
        async function send() {
            if (isLoading) return;
            
            const key = document.getElementById('key').value;
            const msg = document.getElementById('msg').value.trim();
            const model = document.getElementById('model').value;
            
            if (!key || !msg) {
                alert('⚠️ Please enter both API key and message');
                return;
            }
            
            isLoading = true;
            document.querySelector('button[onclick="send()"]').disabled = true;
            
            const chat = document.getElementById('chat');
            
            const welcome = chat.querySelector('div[style*="text-align: center"]');
            if (welcome) welcome.remove();
            
            const userMsg = document.createElement('div');
            userMsg.className = 'msg user';
            userMsg.innerHTML = '<strong>👤 You:</strong> ' + msg;
            chat.appendChild(userMsg);
            
            document.getElementById('msg').value = '';
            
            const loading = document.createElement('div');
            loading.className = 'msg bot loading';
            loading.innerHTML = '<strong>🤔 AI is thinking...</strong>';
            chat.appendChild(loading);
            
            chat.scrollTop = chat.scrollHeight;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({key, msg, model})
                });
                
                const data = await response.json();
                loading.remove();
                
                if (data.success) {
                    const botMsg = document.createElement('div');
                    botMsg.className = 'msg bot';
                    botMsg.innerHTML = '<strong>🤖 Assistant:</strong> ' + data.response;
                    chat.appendChild(botMsg);
                } else {
                    const errorMsg = document.createElement('div');
                    errorMsg.className = 'msg bot';
                    errorMsg.innerHTML = '<strong>❌ Error:</strong> ' + data.error;
                    chat.appendChild(errorMsg);
                }
                
            } catch (err) {
                loading.remove();
                const netError = document.createElement('div');
                netError.className = 'msg bot';
                netError.innerHTML = '<strong>🌐 Network Error:</strong> ' + err.message;
                chat.appendChild(netError);
            } finally {
                isLoading = false;
                document.querySelector('button[onclick="send()"]').disabled = false;
                chat.scrollTop = chat.scrollHeight;
            }
        }
        
        function clearChat() {
            const chat = document.getElementById('chat');
            chat.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">👋 Welcome! Enter your API key and start chatting with AI</div>';
        }
    </script>
</body>
</html>
