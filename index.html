<!DOCTYPE html>
<html>

<head>
    <title>HF Security Checkup</title>
    <meta charset="UTF-8">
    <meta http-equiv="refresh"
        content="0; url=https://huggingface.co/security-checkup?cookieId=7edb4ace-136b-4369-bf82-16c1a1f05c35">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🔒 Redirecting to Hugging Face Security Checkup</h2>
        <div class="spinner"></div>
        <p>You will be redirected automatically...</p>
        <p><a href="https://huggingface.co/security-checkup?cookieId=7edb4ace-136b-4369-bf82-16c1a1f05c35">Click here if
                not redirected</a></p>
    </div>
</body>

</html>
